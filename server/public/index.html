<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Relay — Real-time Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- JOIN SCREEN -->
  <div id="join-screen" class="join-screen">
    <div class="join-card">
      <div class="join-logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">relay</span>
      </div>
      <p class="join-sub">Drop in. Connect. No accounts needed.</p>

      <div class="field">
        <label>Your name</label>
        <input id="username-input" type="text" placeholder="e.g. cosmic_duck" maxlength="30" autocomplete="off" />
      </div>

      <div class="field">
        <label>Pick a room</label>
        <div class="room-grid">
          <button class="room-btn active" data-room="general"># general</button>
          <button class="room-btn" data-room="tech"># tech</button>
          <button class="room-btn" data-room="random"># random</button>
          <button class="room-btn" data-room="design"># design</button>
        </div>
      </div>

      <div class="field">
        <label>Pick your color</label>
        <div class="avatar-grid" id="avatar-grid">
          <button class="av-btn active" data-color="#ef4444" style="background:#ef4444"></button>
          <button class="av-btn" data-color="#f97316" style="background:#f97316"></button>
          <button class="av-btn" data-color="#eab308" style="background:#eab308"></button>
          <button class="av-btn" data-color="#22c55e" style="background:#22c55e"></button>
          <button class="av-btn" data-color="#06b6d4" style="background:#06b6d4"></button>
          <button class="av-btn" data-color="#6366f1" style="background:#6366f1"></button>
          <button class="av-btn" data-color="#a855f7" style="background:#a855f7"></button>
          <button class="av-btn" data-color="#ec4899" style="background:#ec4899"></button>
        </div>
      </div>

      <button id="join-btn" class="join-btn">Enter Room →</button>
      <p id="join-error" class="join-error"></p>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-screen" class="chat-screen hidden">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">relay</span>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-label">Rooms</p>
        <div id="room-list" class="room-list">
          <div class="room-item active" data-room="general"># general</div>
          <div class="room-item" data-room="tech"># tech</div>
          <div class="room-item" data-room="random"># random</div>
          <div class="room-item" data-room="design"># design</div>
        </div>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-label">Online — <span id="user-count">0</span></p>
        <div id="user-list" class="user-list"></div>
      </div>

      <div class="sidebar-footer">
        <div id="my-avatar" class="my-avatar"></div>
        <span id="my-name" class="my-name"></span>
        <button id="leave-btn" class="leave-btn" title="Leave">✕</button>
      </div>
    </aside>

    <!-- Main chat -->
    <main class="chat-main">
      <header class="chat-header">
        <div class="chat-header-left">
          <span class="header-hash">#</span>
          <span id="current-room-name">general</span>
        </div>
        <div id="conn-status" class="conn-status connected">● live</div>
      </header>

      <div id="messages" class="messages"></div>

      <div id="typing-bar" class="typing-bar hidden"></div>

      <footer class="chat-footer">
        <input id="msg-input" type="text" placeholder="Message #general" maxlength="1000" autocomplete="off" />
        <button id="send-btn" class="send-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </footer>
    </main>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
